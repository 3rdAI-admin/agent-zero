services:
  agent-zero:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BRANCH: "${BRANCH:-local}"
    image: agent-zero:local
    container_name: agent-zero
    env_file:
      - path: .env
        required: false
    environment:
      # Claude Code config directory - persists OAuth credentials
      - CLAUDE_CONFIG_DIR=/home/claude/.claude
      # Serve HTTP only: set to 1 to avoid self-signed cert. Unset = HTTPS (enables browser microphone from any host).
      - AGENT_ZERO_HTTP_ONLY=1
      # HTTP mode: in-app Flare (Cloudflare) tunnel works; use http:// for Web UI, MCP, A2A. For browser mic use http://localhost:8888 on same machine.
      # - AGENT_ZERO_CERT_IPS=192.168.50.7
      # Uncomment once to regenerate cert with the IP above, then comment out again
      # - AGENT_ZERO_REGENERATE_CERT=1
    ports:
      - "${HOST_PORT:-8888}:80"  # Web UI accessible on port 8888
      - "5901:5900"  # VNC server for browser access (CAPTCHA completion) - use 5901 to avoid conflicts
    volumes:
      # Mount host repo so Agent Zero can read/edit its own code (run compose from repo root)
      - .:/git/agent-zero
      # Projects, tasks (scheduler), settings, chats live in usr — must persist across rebuilds
      # Use this exact host path so projects/tasks don't disappear after docker compose build/up
      - /Users/james/Docker/A0_volume:/a0/usr
      # Persist .env so auth and API keys survive container recreation
      - ./.env:/a0/.env
      # Persist data directories that change at runtime
      - ./memory:/a0/memory
      - ./knowledge:/a0/knowledge
      - ./logs:/a0/logs
      - ./tmp:/a0/tmp
      # Persist Claude Code OAuth authentication
      - ./claude-config:/root/.config/claude-code
      # Also mount for claude user (for YOLO mode)
      - ./claude-config:/home/claude/.config/claude-code
      # Persist Claude Code credentials (where tokens are actually stored)
      - ./claude-credentials:/home/claude/.claude
      # Persist keyring data for Claude Code OAuth tokens
      - ./claude-keyring:/home/claude/.local/share/python_keyring
      # Persist gnome-keyring data
      - ./claude-gnome-keyring:/home/claude/.local/share/keyrings
      # Persist Playwright browser binaries so they survive container recreates
      - ./playwright-browsers:/root/.cache/ms-playwright
    # Network configuration for LAN access and security scanning
    # CURRENT: Bridge mode with capabilities - Port 8888 maintained, allows network scanning
    # Option 1: Use host network mode (full access to host network)
    # NOTE: If you enable host network mode, you must remove the ports section
    # and the Web UI will be on port 80 (not 8888)
    # Uncomment the line below ONLY if you need maximum network access:
    # network_mode: host
    # Option 2: Bridge mode with capabilities (CURRENT - keeps port 8888, allows scanning)
    # Keep network_mode commented and use cap_add below
    cap_add:
      - NET_RAW      # Required for nmap and other raw socket tools
      - NET_ADMIN    # Required for advanced network operations
      - SYS_ADMIN    # May be needed for some security tools
    # Hostname resolution: host gateway + optional LAN machines so the container can resolve names (ping, nmap, ssh, etc.)
    # Syntax: "hostname:ip" per line. Use host-gateway for the host machine. Add your LAN hosts below.
    extra_hosts:
      - "host.docker.internal:host-gateway"
      # Example: uncomment and edit so Agent Zero can resolve friendly names to LAN IPs
      # - "nas:192.168.50.5"
      # - "my-server:192.168.50.10"
      # - "router:192.168.50.1"
    # Connect to Archon's Docker network so agent-zero can reach archon-mcp by container name
    # without routing through the host port proxy (which is fragile on Docker Desktop).
    # The default agentz_default network is kept automatically by compose; archon_app-network
    # is the external network created by the Archon stack.
    networks:
      - default
      - archon_app-network
    restart: unless-stopped
    # Shared memory for Chromium/Playwright (default 64MB is small; larger shm improves browser responsiveness)
    shm_size: '512mb'
    # Total memory+swap = 16G (same as memory limit) so container cannot use extra swap — predictable response under memory pressure
    memswap_limit: 16g
    # Resource limits - set to 16GB for better responsiveness; Docker Desktop must allow at least this much
    deploy:
      resources:
        limits:
          memory: 16G     # Max memory (increase if host has more and agent is still slow)
          cpus: '4.0'     # Max CPU cores
        reservations:
          memory: 10G       # Guaranteed RAM for more consistent latency (was 8G)
          cpus: '3.0'       # Guaranteed CPU (was 2.0)
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s    # App often ready in 20–30s; /health makes healthy sooner

  # Ollama (local LLM), CPU-only by default. Agent Zero can use http://ollama:11434 when on same network.
  # For GPU: use docker-compose.gpu.yml override — docker compose -f docker-compose.yml -f docker-compose.gpu.yml up -d
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - default
    restart: unless-stopped

  # Google Workspace MCP (Gmail, Drive, Docs, Sheets, Calendar, etc.). Agent Zero connects at http://workspace_mcp:8889/mcp.
  # MCP_ENABLE_OAUTH21=false: single-account mode — server uses credentials in workspace-mcp-credentials (no bearer token needed).
  # Set MCP_ENABLE_OAUTH21=true for multi-user; then add "headers": {"Authorization": "Bearer <token>"} to google_workspace in Settings → MCP.
  # First-time OAuth: run ./scripts/setup/run_workspace_mcp.sh on the host once, then copy ~/.google_workspace_mcp to ./workspace-mcp-credentials.
  workspace_mcp:
    build:
      context: .
      dockerfile: docker/workspace-mcp/Dockerfile
    image: agent-zero-workspace-mcp:local
    container_name: workspace_mcp
    env_file:
      - path: .env
        required: false
    environment:
      - WORKSPACE_MCP_PORT=8889
      - MCP_ENABLE_OAUTH21=false
    volumes:
      - ./workspace-mcp-credentials:/home/mcp/.google_workspace_mcp
    expose:
      - "8889"
    ports:
      - "127.0.0.1:8889:8889"  # Host Claude Code only; not exposed to LAN
    networks:
      - default
    restart: unless-stopped

# External networks: archon_app-network is managed by the Archon docker-compose stack.
# It must be running (docker compose up) before agent-zero starts, or agent-zero will
# fail to join the network. If Archon is not deployed, comment out the networks block
# and the networks entry under agent-zero.
networks:
  archon_app-network:
    external: true

volumes:
  ollama_data: {}
