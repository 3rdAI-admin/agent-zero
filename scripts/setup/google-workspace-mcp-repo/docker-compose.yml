services:
  workspace_mcp:
    build: .
    image: google-workspace-mcp:local
    container_name: workspace_mcp
    env_file:
      - .env
    environment:
      - WORKSPACE_MCP_PORT=8889
      - MCP_ENABLE_OAUTH21=true
    volumes:
      - ./workspace-mcp-credentials:/home/mcp/.google_workspace_mcp
    expose:
      - "8889"
    restart: unless-stopped
