<html>
  <head>
    <title>External MCP Servers</title>
  </head>

  <body>
    <div x-data="{ get settings() { return $store.settings.settings } }">
      <template x-if="settings">
        <div>
          <div class="section-title">External MCP Servers</div>
          <div class="section-description">
            Agent Zero can use external MCP servers, local or remote as tools.
            To add <strong>Google Workspace</strong> (Gmail, Drive, Docs, Sheets, Calendar): if using Docker Compose, the <code>workspace_mcp</code> service can run in the stack — use <code>url: "http://workspace_mcp:8889/mcp"</code> and <code>type: "streamable-http"</code>. Or run it on the host with <code>./scripts/setup/run_workspace_mcp.sh</code> and use <code>url: "http://host.docker.internal:8889/mcp"</code>. See <strong>Examples</strong> in the config modal for a copy-paste snippet.
          </div>

          <div class="field">
            <div class="field-label">
              <div class="field-title">MCP Servers Configuration</div>
              <div class="field-description">External MCP servers can be configured here.</div>
            </div>
            <div class="field-control">
              <button
                class="btn btn-field"
                @click="$store.settings.handleFieldButton({ id: 'mcp_servers_config' })"
              >
                Open
              </button>
            </div>
          </div>

          <div class="field">
            <div class="field-label">
              <div class="field-title">MCP Client Init Timeout</div>
              <div class="field-description">
                Timeout for MCP client initialization (in seconds). Higher values might be required for complex MCPs, but might also slowdown system startup.
              </div>
            </div>
            <div class="field-control">
              <input type="number" x-model.number="settings.mcp_client_init_timeout" />
            </div>
          </div>

          <div class="field">
            <div class="field-label">
              <div class="field-title">MCP Client Tool Timeout</div>
              <div class="field-description">
                Timeout for MCP client tool execution. Higher values might be required for complex tools, but might also result in long responses with failing tools.
              </div>
            </div>
            <div class="field-control">
              <input type="number" x-model.number="settings.mcp_client_tool_timeout" />
            </div>
          </div>
        </div>
      </template>
    </div>
  </body>
</html>
